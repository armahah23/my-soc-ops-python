<div id="game-container">
<div class="flex flex-col min-h-full">

    <!-- ── Frosted header ──────────────────────────────────── -->
    <header class="arctic-header flex items-center justify-between p-3">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="btn-ghost">
            ← Back
        </button>
        <span style="font-family:var(--font-display);font-size:0.72rem;letter-spacing:0.28em;color:var(--text-secondary);text-transform:uppercase;">
            Soc&nbsp;Ops
        </span>
        <div class="w-16"></div>
    </header>

    <!-- ── Hint text ───────────────────────────────────────── -->
    <p class="hint-text py-2 px-4">
        Tap a square when you find someone who matches it.
    </p>

    <!-- ── Bingo indicator ─────────────────────────────────── -->
    {% if session.has_bingo %}
    <div class="bingo-banner">
        ✦&nbsp;&nbsp;BINGO! You got a line!&nbsp;&nbsp;✦
    </div>
    {% endif %}

    <!-- ── Board ───────────────────────────────────────────── -->
    <div class="flex-1 flex items-center justify-center p-3">
        {% include "components/bingo_board.html" %}
    </div>

</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
