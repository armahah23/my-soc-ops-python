<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 modal-overlay">
    <div class="modal-card glass-raised rounded-xl p-6 max-w-xs w-full text-center shadow-xl"
         style="border-color: rgba(0,200,255,0.22); border-width:1px; border-style:solid;">

        <!-- Ice crystal icon -->
        <div style="font-size:3.2rem; margin-bottom:0.85rem; line-height:1;
                    filter: drop-shadow(0 0 24px rgba(0,212,255,0.65));"
             aria-hidden="true">❄</div>

        <!-- Title -->
        <div class="modal-title mb-2">BINGO!</div>

        <!-- Subtitle -->
        <p class="modal-subtitle mb-6">You completed a line!</p>

        <!-- CTA -->
        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="btn-arctic w-full py-3 px-6 rounded-lg">
            Keep Playing
        </button>

    </div>
</div>
