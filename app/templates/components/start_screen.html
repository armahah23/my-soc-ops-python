<div id="game-container">
<div class="start-screen">

    <!-- ── Logo block ──────────────────────────────────────── -->
    <div class="logo-lockup anim-1">
        <div class="logo-title">Soc Ops</div>
        <div class="logo-subtitle">Social &nbsp;·&nbsp; Bingo</div>
        <div class="logo-rule"></div>
    </div>

    <!-- ── How to play card ────────────────────────────────── -->
    <div class="how-to-play anim-3">
        <p class="how-to-play-label">How to play</p>
        <ul class="how-to-play-steps">
            <li>
                <span class="step-icon">◈</span>
                Find people around you who match the squares
            </li>
            <li>
                <span class="step-icon">◈</span>
                Tap a square when you find a match
            </li>
            <li>
                <span class="step-icon">◈</span>
                Get 5 in a row to claim BINGO!
            </li>
        </ul>
    </div>

    <!-- ── CTA ─────────────────────────────────────────────── -->
    <div class="w-full max-w-sm anim-4">
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="btn-arctic w-full py-4 px-8 rounded-lg">
            ❄&nbsp;&nbsp;Begin Game
        </button>
    </div>

</div>
</div>
